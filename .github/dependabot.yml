version: 2

updates:
  # Dart/Flutter dependencies (pubspec.yaml)
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Android/Gradle dependencies (android/settings.gradle.kts discovers android/app subproject)
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "android"
    groups:
      minor-patch:
        update-types:
          - "minor"
          - "patch"
